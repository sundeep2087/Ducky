<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Prediction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Make Your Prediction</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="features.html">Features & Parameters</a></li>
            <li><a href="predict.html">Make a Prediction</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <form id="predictionForm">
                <label for="pclass">Pclass:</label>
                <input type="number" id="pclass" name="pclass" min="1" max="3" required>
                
                <label for="sex">Sex:</label>
                <select id="sex" name="sex" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
                
                <label for="sibsp">SibSp:</label>
                <input type="number" id="sibsp" name="sibsp" required>
                
                <label for="parch">Parch:</label>
                <input type="number" id="parch" name="parch" required>
                
                <label for="fare">Fare:</label>
                <input type="number" id="fare" name="fare" step="0.01" required>
                
                <label for="embarked">Embarked:</label>
                <select id="embarked" name="embarked" required>
                    <option value="C">Cherbourg</option>
                    <option value="Q">Queenstown</option>
                    <option value="S">Southampton</option>
                </select>
                
                <label for="model">Model:</label>
                <select id="model" name="model" required>
                    <option value="decision_tree">Decision Tree</option>
                    <option value="random_forest">Random Forest</option>
                    <option value="adaboost">AdaBoost</option>
                    <option value="gradient_boosting">Gradient Boosting</option>
                    <option value="sgd">Stochastic Gradient Descent</option>
                </select>
                
                <button type="submit">Predict</button>
            </form>
            <div id="predictionResult"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Titanic Survival Predictor</p>
    </footer>
    <script src="predict.js"></script>
</body>
</html>
