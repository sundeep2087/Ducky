<!-- filename: webapp/UI/prediction.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction</title>
    <link rel="stylesheet" href="styles.css">
    <script src="prediction.js" defer></script>
</head>
<body>
    <header>
        <h1>Survival Prediction</h1>
    </header>
    <main>
        <form id="predictionForm">
            <label for="pclass">Pclass:</label>
            <select id="pclass" name="pclass">
                <option value="1">1st Class</option>
                <option value="2">2nd Class</option>
                <option value="3">3rd Class</option>
            </select>
            <label for="sex">Sex:</label>
            <select id="sex" name="sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age">
            <label for="sibsp">SibSp:</label>
            <input type="number" id="sibsp" name="sibsp">
            <label for="parch">Parch:</label>
            <input type="number" id="parch" name="parch">
            <label for="fare">Fare:</label>
            <input type="number" step="0.01" id="fare" name="fare">
            <label for="embarked">Embarked:</label>
            <select id="embarked" name="embarked">
                <option value="C">Cherbourg</option>
                <option value="Q">Queenstown</option>
                <option value="S">Southampton</option>
            </select>
            <label for="model">Model:</label>
            <select id="model" name="model">
                <option value="decision_tree">Decision Tree</option>
                <option value="random_forest">Random Forest</option>
                <option value="adaboost">AdaBoost</option>
                <option value="gradient_boosting">Gradient Boosting</option>
                <option value="sgd">SGD Classifier</option>
            </select>
            <button type="submit">Predict</button>
        </form>
        <div id="predictionResult"></div>
    </main>
</body>
</html>
